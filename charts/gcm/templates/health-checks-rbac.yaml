{{- if .Values.healthChecks.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gcm.fullname" . }}-health-checks
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
    app.kubernetes.io/component: health-checks
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gcm.fullname" . }}-health-checks
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
    app.kubernetes.io/component: health-checks
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gcm.fullname" . }}-health-checks
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
    app.kubernetes.io/component: health-checks
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gcm.fullname" . }}-health-checks
subjects:
  - kind: ServiceAccount
    name: {{ include "gcm.fullname" . }}-health-checks
    namespace: {{ .Release.Namespace }}
{{- end }}
